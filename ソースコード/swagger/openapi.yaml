openapi: 3.0.3
info:
  title: ねむりやAPI
  version: 0.0.0
  contact: {}
  description: ねむりやAPI
tags:
  - name: auth
    description: 認証関連
  - name: recommends
    description: レコメンド関連
  - name: orders
    description: オーダー関連
  - name: measure
    description: 計測関連
paths:
  /signin/:
    post:
      summary: サインイン
      description: ユーザーのサインイン
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthUserSignin'
      responses:
        '200':
          description: サインイン完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserSigninError'
        '403':
          $ref: '#/components/responses/Forbidden'
      security: []
      operationId: signin
  /recommends/:
    post:
      summary: おすすめの判定
      description: ヒアリング及び計測データを基におすすめの判定を行う
      tags:
        - recommends
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
        description: ''
      responses:
        '201':
          description: おすすめを提示
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - token_auth: []
      operationId: recommends
  /orders/:
    post:
      summary: オーダー
      description: 商品の注文を行う
      tags:
        - orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: オーダー完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - token_auth: []
      operationId: orders
  /measure/:
    post:
      summary: 身体測定
      description: 整体師モードによってVisionPoseでの測定のみを行う
      tags:
        - measure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasureOnly'
      responses:
        '201':
          description: 計測結果を提示
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasureOnly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - token_auth: []
      operationId: measure
components:
  responses:
    BadRequest:
      description: BadRequest
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    NotFound:
      description: NotFound
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerErrorMessage'
  schemas:
    AuthUserToken:
      description: ユーザー認証トークン
      type: string
      minLength: 40
      maxLength: 40
      example: 7e57166764fd248084928e1af2d19b1d3e21b016
    AuthUser:
      description: ログイントークンとユーザ情報
      type: object
      properties:
        token:
          $ref: '#/components/schemas/AuthUserToken'
        user:
          $ref: '#/components/schemas/User'
    AuthUserSignin:
      description: ユーザーサインイン時の入力項目
      type: object
      properties:
        email:
          $ref: '#/components/schemas/UserEmail'
        password:
          $ref: '#/components/schemas/UserPassword'
      required:
        - email
        - password
    AuthUserSigninError:
      description: ユーザーサインイン時のバリデーションエラーメッセージ
      type: object
      properties:
        non_field_errors:
          $ref: '#/components/schemas/ValidationErrorMessages'
        email:
          $ref: '#/components/schemas/ValidationErrorMessages'
        password:
          $ref: '#/components/schemas/ValidationErrorMessages'
    User:
      description: ユーザー情報
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        username:
          $ref: '#/components/schemas/UserName'
        email:
          $ref: '#/components/schemas/UserEmail'
        password:
          $ref: '#/components/schemas/UserPassword'
        type:
          $ref: '#/components/schemas/UserType'
    UserId:
      description: ユーザーID（uuid）
      type: string
      format: uuid
      readOnly: true
      example: 6cbb962a-d928-5e6c-70f1-8194d612a0e7
    UserName:
      description: ユーザー名
      type: string
      minLength: 4
      maxLength: 64
      example: nemuriyataro
    UserType:
      type: string
      description: |-
        ユーザー種類（管理者・サロン・ふるさと納税・クラウドファンディング）
        ふるさと納税・クラウドファンディングユーザーは，/measure/エンドポイントを利用できない
      title: UserType
      example: furusato_tax
      enum:
        - admin
        - salon
        - furusato_tax
        - crowd_funding
      readOnly: true
    UserEmail:
      description: ユーザーのメールアドレス
      type: string
      example: nemuriya@example.com
    UserPassword:
      description: ユーザーのパスワード
      type: string
      format: password
      writeOnly: true
      example: QGGxIMPC
    RecommendRequest:
      description: おすすめ情報リクエスト
