<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Dormire 姿勢計測プロトタイプの検証ページ。ブラウザのカメラで全身を撮影し、骨格ランドマークから 20 項目を算出します。"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f1115" />
    <title>計測 — Dormire Phase 0 プロトタイプ</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="card">
        <div class="stage" id="stage">
          <div class="fps" id="fps">FPS: --</div>
          <div class="step-indicator" id="stepIndicator">
            <span id="stepText">① 正面</span>
            <span class="step-dots">
              <span class="dot active" id="dotFront"></span>
              <span class="dot" id="dotSide"></span>
            </span>
          </div>
          <video
            id="video"
            playsinline
            autoplay
            muted
            webkit-playsinline
          ></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="thumbs" id="thumbs" hidden>
          <figure>
            <img id="thumbFront" alt="正面" />
            <figcaption>正面</figcaption>
          </figure>
          <figure>
            <img id="thumbSide" alt="横から" />
            <figcaption>横から</figcaption>
          </figure>
        </div>
        <div class="controls">
          <button id="btnCapture" disabled>正面を測定</button>
          <button id="btnReset" class="ghost">リセット</button>
        </div>
      </section>

      <section class="card" id="materialCard" hidden>
        <h3 style="margin: 0 0 8px 0; font-size: 14px">枕の素材を選択</h3>
        <div class="material-options" id="materialOptions">
          <label class="material-option">
            <input type="radio" name="pillowMaterial" value="ソフトパイプ" />
            <span>ソフトパイプ</span>
          </label>
          <label class="material-option">
            <input type="radio" name="pillowMaterial" value="エラストマーパイプ" />
            <span>エラストマーパイプ</span>
          </label>
          <label class="material-option">
            <input type="radio" name="pillowMaterial" value="備長炭パイプ" />
            <span>備長炭パイプ</span>
          </label>
          <label class="material-option">
            <input type="radio" name="pillowMaterial" value="ソフト綿" />
            <span>ソフト綿</span>
          </label>
          <label class="material-option">
            <input type="radio" name="pillowMaterial" value="トルマリンパイプ" />
            <span>トルマリンパイプ</span>
          </label>
        </div>
        <div class="material-selected" id="materialSelected" hidden></div>
      </section>

      <section class="card" id="resultsCard" hidden>
        <h3 style="margin: 0 0 8px 0; font-size: 14px">計測結果 (20項目)</h3>
        <table class="results">
          <thead>
            <tr>
              <th>項目</th>
              <th class="num">正面</th>
              <th class="num">横から</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
        <div class="legend">
          値は画像正規化座標 [0,1] ベース。Apple Vision
          との絶対値比較にはキャリブレーションが必要です（計画書 L344）。
        </div>
      </section>
    </main>

    <footer>
      Dormire — 姿勢計測プロトタイプ（Phase 0 Go/No-Go 判定用）
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
