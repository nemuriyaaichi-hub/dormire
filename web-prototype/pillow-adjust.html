<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f1115" />
    <title>枕g調整 — Dormire</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="adjust-page">
      <section class="card adjust-hero">
        <div>
          <div class="adjust-kicker">Pillow Filling</div>
          <h1>枕g調整</h1>
        </div>
        <button class="ghost compact-button" id="backMeasure">計測へ戻る</button>
      </section>

      <section class="card adjust-summary">
        <div>
          <span>素材</span>
          <strong id="summaryMaterial">—</strong>
        </div>
        <div>
          <span>姿勢</span>
          <strong id="summaryPosture">—</strong>
        </div>
        <div>
          <span>後頭部</span>
          <strong id="summaryOcciput">—</strong>
        </div>
        <div>
          <span>頚部凹み</span>
          <strong id="summaryCervical">—</strong>
        </div>
      </section>

      <!-- 枕ビジュアル図（2列×3行 = 実物の6エリアに対応） -->
      <section class="card pillow-card">
        <div class="pillow-axis-label pillow-axis-top">頭側</div>
        <div class="pillow-wrap">
          <div class="pillow-col-label">左</div>
          <div class="pillow-diagram" id="pillowDiagram">
            <!-- Row 1: 横向き -->
            <div class="pzone" data-zone="leftSide">
              <div class="pzone-name">左横向き</div>
              <div class="pzone-value" id="pval-leftSide">—</div>
            </div>
            <div class="pzone" data-zone="rightSide">
              <div class="pzone-name">右横向き</div>
              <div class="pzone-value" id="pval-rightSide">—</div>
            </div>
            <!-- Row 2: 後頭部・首元 -->
            <div class="pzone" data-zone="centerBack">
              <div class="pzone-name">中央・後頭部</div>
              <div class="pzone-value" id="pval-centerBack">—</div>
            </div>
            <div class="pzone" data-zone="neck">
              <div class="pzone-name">首元</div>
              <div class="pzone-value" id="pval-neck">—</div>
            </div>
            <!-- Row 3: 肩口 -->
            <div class="pzone" data-zone="leftShoulder">
              <div class="pzone-name">左肩口</div>
              <div class="pzone-value" id="pval-leftShoulder">—</div>
            </div>
            <div class="pzone" data-zone="rightShoulder">
              <div class="pzone-name">右肩口</div>
              <div class="pzone-value" id="pval-rightShoulder">—</div>
            </div>
          </div>
          <div class="pillow-col-label">右</div>
        </div>
        <div class="pillow-axis-label pillow-axis-bottom">肩側</div>
      </section>

      <!-- 選択ゾーンのコントロール -->
      <section class="card zone-control" id="zoneControl">
        <div class="gram-zone-head">
          <span id="controlZoneLabel">ゾーンをタップして選択</span>
          <strong id="controlZoneValue">— g</strong>
        </div>
        <div class="gram-controls" id="controlButtons">
          <button class="ghost" data-delta="-10" disabled>-10</button>
          <button class="ghost" data-delta="-5" disabled>-5</button>
          <button data-delta="5" disabled>+5</button>
          <button data-delta="10" disabled>+10</button>
        </div>
      </section>

      <section class="card adjust-total">
        <span>合計</span>
        <strong id="totalGram">— g</strong>
      </section>
    </main>

    <script>
      const MATERIAL_FACTOR = {
        ソフトパイプ: 1,
        エラストマーパイプ: 1.08,
        備長炭パイプ: 1.14,
        ソフト綿: 0.72,
        トルマリンパイプ: 1.18,
        未選択: 1,
      };

      const POSTURE_LABELS = {
        N: "N（理想姿勢）",
        U: "U（反り腰）",
        丸: "丸（猫背）",
        W: "W（強いS字カーブ）",
      };

      const ZONE_LABELS = [
        ["leftSide",      "左横向き"],
        ["rightSide",     "右横向き"],
        ["centerBack",    "中央・後頭部"],
        ["neck",          "首元"],
        ["leftShoulder",  "左肩口"],
        ["rightShoulder", "右肩口"],
      ];

      const state = loadState();
      const grams = calculateInitialGrams(state);
      let activeZone = null;

      document.getElementById("backMeasure").addEventListener("click", () => {
        window.location.href = "./measure.html";
      });

      render();

      function loadState() {
        try {
          return (
            JSON.parse(sessionStorage.getItem("dormirePillowAdjustment")) || {}
          );
        } catch {
          return {};
        }
      }

      function calculateInitialGrams(data) {
        const side = data.side || {};
        const material = data.pillowMaterial || "未選択";
        const factor = MATERIAL_FACTOR[material] || 1;
        const occiput = Number(side.occipital_protrusion || 0.035);
        const cervical = Number(
          side.cervical_depth_skin || side.cervical_depth || 0.025
        );
        const shoulder = Number(
          side.right_shoulder_width || side.left_shoulder_width || 0.08
        );
        const forward = Number(side.forward_head || 0.03);
        const posture = side.posture || "N";
        const postureBoost = posture === "丸" ? 1.08 : posture === "U" ? 0.96 : 1;

        const base = {
          centerBack: 70 + occiput * 900,
          neck: 80 + cervical * 1400 + forward * 500,
          leftSide: 95 + shoulder * 650,
          rightSide: 95 + shoulder * 650,
          leftShoulder: 55 + shoulder * 360,
          rightShoulder: 55 + shoulder * 360,
        };

        return Object.fromEntries(
          Object.entries(base).map(([key, value]) => [
            key,
            round5(value * factor * postureBoost),
          ])
        );
      }

      function round5(value) {
        return Math.max(0, Math.round(value / 5) * 5);
      }

      function render() {
        const side = state.side || {};
        document.getElementById("summaryMaterial").textContent =
          state.pillowMaterial || "未選択";
        document.getElementById("summaryPosture").textContent =
          POSTURE_LABELS[side.posture] || side.posture || "—";
        document.getElementById("summaryOcciput").textContent = fmt(
          side.occipital_protrusion
        );
        document.getElementById("summaryCervical").textContent = fmt(
          side.cervical_depth_skin || side.cervical_depth
        );

        for (const [key] of ZONE_LABELS) {
          document.getElementById(`pval-${key}`).textContent = `${grams[key]} g`;
        }

        for (const pzone of document.querySelectorAll(".pzone")) {
          pzone.addEventListener("click", () => selectZone(pzone.dataset.zone));
        }

        for (const btn of document.querySelectorAll("#controlButtons button")) {
          btn.addEventListener("click", () => {
            if (!activeZone) return;
            const delta = Number(btn.dataset.delta);
            grams[activeZone] = Math.max(0, grams[activeZone] + delta);
            updateTotals();
          });
        }

        updateTotals();
      }

      function selectZone(key) {
        activeZone = key;
        const label = ZONE_LABELS.find(([k]) => k === key)?.[1] || key;

        for (const el of document.querySelectorAll(".pzone")) {
          el.classList.toggle("active", el.dataset.zone === key);
        }

        document.getElementById("controlZoneLabel").textContent = label;
        document.getElementById("controlZoneValue").textContent = `${grams[key]} g`;
        for (const btn of document.querySelectorAll("#controlButtons button")) {
          btn.disabled = false;
        }
      }

      function updateTotals() {
        for (const [key] of ZONE_LABELS) {
          document.getElementById(`pval-${key}`).textContent = `${grams[key]} g`;
        }
        if (activeZone) {
          document.getElementById("controlZoneValue").textContent = `${grams[activeZone]} g`;
        }
        const total = Object.values(grams).reduce((sum, v) => sum + v, 0);
        document.getElementById("totalGram").textContent = `${total} g`;
      }

      function fmt(value) {
        return typeof value === "number" ? value.toFixed(3) : "—";
      }
    </script>
  </body>
</html>
