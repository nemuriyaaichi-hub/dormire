<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Dormire Phase 0 計測プロトタイプ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Dormire 計測プロトタイプ</h1>
        <div class="subtitle">Phase 0 / MediaPipe Pose 検証</div>
      </div>
      <a href="./test.html" class="subtitle">▶ テスト</a>
    </header>

    <main>
      <section class="card">
        <div class="stage" id="stage">
          <div class="fps" id="fps">FPS: --</div>
          <video
            id="video"
            playsinline
            autoplay
            muted
            webkit-playsinline
          ></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="btnStart">📷 カメラ起動</button>
          <button id="btnCapture" disabled>📸 計測</button>
          <button id="btnReset" class="ghost">リセット</button>
        </div>
        <div class="status" id="status">待機中 — カメラを起動してください</div>
        <div class="legend">
          ※ iOS Safari / Android Chrome で HTTPS が必要です。ローカルは
          localhost のみ例外。
        </div>
      </section>

      <section class="card" id="resultsCard" hidden>
        <h3 style="margin: 0 0 8px 0; font-size: 14px">計測結果 (20項目)</h3>
        <table class="results">
          <tbody id="resultsBody"></tbody>
        </table>
        <div class="legend">
          値は画像正規化座標 [0,1] ベース。Apple Vision
          との絶対値比較にはキャリブレーションが必要です（計画書 L344）。
        </div>
      </section>
    </main>

    <footer>Dormire — Phase 0 Go/No-Go 判定用プロトタイプ</footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
